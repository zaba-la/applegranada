name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Evita ejecuciones duplicadas: cancela runs en curso de la misma rama/PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Mínimo privilegio por defecto para el GITHUB_TOKEN.
permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  # --------------------------------------------------------------------------
  # Calidad de código: instala dependencias, type-check, lint, tests y build.
  # --------------------------------------------------------------------------
  quality:
    name: Quality (lint, type-check, build)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Run tests (si están configurados)
        run: npm run test --if-present

      # Build de validación: solo comprueba que el proyecto COMPILA.
      # No requiere las variables de la app (el código usa fallbacks seguros).
      # La build real de producción se hace en el job 'deploy', tomando las
      # variables directamente desde Vercel vía 'vercel pull'.
      - name: Build
        run: npm run build

  # --------------------------------------------------------------------------
  # Deploy a Vercel (producción) — solo en push a main y si todo pasó.
  # Usa el Vercel CLI oficial en lugar de una action de terceros.
  # --------------------------------------------------------------------------
  deploy:
    name: Deploy to Vercel (production)
    runs-on: ubuntu-latest
    needs: [quality]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
      url: ${{ steps.deploy.outputs.url }}
    env:
      VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
      VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Vercel CLI
        run: npm install --global vercel@latest

      - name: Pull Vercel environment information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build project artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy to Vercel
        id: deploy
        run: |
          url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})
          echo "url=$url" >> "$GITHUB_OUTPUT"
          echo "Deployed to: $url"
