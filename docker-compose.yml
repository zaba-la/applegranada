version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: applegranada_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: applegranada
      POSTGRES_USER: applegranada
      POSTGRES_PASSWORD: applegranada
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U applegranada"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: applegranada_app
    restart: unless-stopped
    environment:
      DATABASE_URL: "postgresql://applegranada:applegranada@db:5432/applegranada"
      NEXTAUTH_SECRET: "dev-secret-key"
      NEXTAUTH_URL: "http://localhost:3000"
      NODE_ENV: "development"
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next
    command: >
      sh -c "npx prisma migrate dev --name init && npm run dev"

volumes:
  postgres_data:
